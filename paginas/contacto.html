    <main>
        <h1>Cuéntanos sobre tu negocio</h1>
        <section>
            <form action="#" method="post">
                <div>
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. Luis García Solis" required />
                </div>
                <div>
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@gmail.com" required />
                </div>
                <div>
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="+506 8888 0000" required />
                </div>
                <div>
                    <label for="dedicacion">¿A qué se dedica su negocio?</label>
                    <textarea id="dedicacion" name="dedicacion" placeholder="Ej. Clínica dental, tienda de ropa, restaurante..." required></textarea>
                </div>
                <div>
                    <label for="inspiracion">¿Inspiración de lo que aspira en su perfil?</label>
                    <textarea id="inspiracion" name="inspiracion" placeholder="Ej. Cuéntenos referencias, estilos o perfiles que le gustaría reflejar" required></textarea>
                </div>
                <div>
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" placeholder="Cuéntenos un poco más sobre lo que busca"></textarea>
                </div>
                <button type="submit">Enviar mensaje</button>
            </form>
        </section>
